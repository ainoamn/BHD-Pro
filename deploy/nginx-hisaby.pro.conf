# Nginx reverse proxy for hisaby.pro
# Place on the server (e.g. /etc/nginx/sites-available/hisaby.pro)
# Then: certbot --nginx -d hisaby.pro -d www.hisaby.pro

upstream hisaby_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream hisaby_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name hisaby.pro www.hisaby.pro;

    # Certbot will upgrade this to HTTPS
    location / {
        return 301 https://hisaby.pro$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.hisaby.pro;

    # ssl_certificate managed by Certbot
    return 301 https://hisaby.pro$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hisaby.pro;

    # ssl_certificate /etc/letsencrypt/live/hisaby.pro/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/hisaby.pro/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    # API (Nest) — also used by Next rewrite /backend-api
    location /api/ {
        proxy_pass http://hisaby_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /backend-api/ {
        rewrite ^/backend-api/(.*)$ /api/$1 break;
        proxy_pass http://hisaby_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Next.js app
    location / {
        proxy_pass http://hisaby_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
