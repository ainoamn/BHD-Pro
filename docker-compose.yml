# Local development only — do NOT use as production compose without hardening.
# For production: remove host port bindings, use secrets manager, TLS reverse proxy.
services:
  postgres:
    image: postgres:16-alpine
    container_name: qootk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qootk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qootk_secret}
      POSTGRES_DB: qootk_pro
    # Bind to localhost only (not 0.0.0.0) for safer local dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - qootk_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qootk -d qootk_pro"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qootk-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - qootk_redis_data:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-qootk_redis_dev}"]

volumes:
  qootk_pg_data:
  qootk_redis_data:
